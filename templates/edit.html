<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予定の編集</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .form-section { border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: inline-block; width: 100px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 300px; padding: 5px; }
        .btn-submit { padding: 8px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        .btn-submit:hover { background-color: #218838; }
        .btn-cancel { margin-left: 10px; color: #6c757d; text-decoration: none; }
        .flash-error { color: red; background-color: #fce8e6; padding: 10px; margin-bottom: 15px; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>予定の編集</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-error">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="form-section">
        <form action="{{ url_for('edit', id=schedule.id) }}" method="POST">
            <div class="form-group">
                <label for="title">予定名 *</label>
                <input type="text" id="title" name="title" value="{{ schedule.title }}">
            </div>
            <div class="form-group">
                <label for="date">日付 *</label>
                <input type="date" id="date" name="date" value="{{ schedule.date }}">
            </div>
            <div class="form-group">
                <label for="time">時間</label>
                <input type="time" id="time" name="time" value="{{ schedule.time }}">
            </div>
            <div class="form-group">
                <label for="location">場所</label>
                <input type="text" id="location" name="location" value="{{ schedule.location }}">
            </div>
            <div class="form-group">
                <label for="memo">メモ</label>
                <textarea id="memo" name="memo" rows="3">{{ schedule.memo }}</textarea>
            </div>
            <button type="submit" class="btn-submit">更新する</button>
            <a href="{{ url_for('index') }}" class="btn-cancel">キャンセル</a>
        </form>
    </div>

</body>
</html>
